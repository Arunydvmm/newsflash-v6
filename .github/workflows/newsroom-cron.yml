name: NewsFlash AI Pipeline

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  trigger-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger newsroom pipeline
        run: |
          curl -X GET \
            -H "x-scheduler-secret: ${{ secrets.SCHEDULER_SECRET }}" \
            ${{ secrets.SITE_URL }}/api/newsroom/scheduler
